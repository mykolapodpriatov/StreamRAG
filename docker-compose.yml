version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    ports:
      # Bind to loopback only: the broker has no auth and is reached by
      # host-run worker/dashboard processes, not from other machines.
      - "127.0.0.1:6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
